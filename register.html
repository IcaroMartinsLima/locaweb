<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cadastro - UniversalScore</title>
</head>
<body class="auth-body">
    <div class="login-box">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="images/UniversalScore.png" alt="Logo" style="height: 30px;">
        </div>
        <h2>Cadastro</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Senha" required>
            <input type="password" id="confirmPassword" placeholder="Confirmar Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p>Já tem conta? <a href="login.html" style="color: #1554CC; cursor: pointer;">Faça login aqui</a></p>
    </div>

    <script src="commonScript.js"></script>
    <script src="loginScript.js"></script>
</body>
</html>
