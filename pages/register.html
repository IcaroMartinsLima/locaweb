<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="../images/UniversalScore.png">
    <title>Cadastro - UniversalScore</title>
</head>
<body class="auth-body">
    <div class="login-box">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="../images/UniversalScore.png" alt="Logo" style="height: 30px;">
        </div>
        <h2>Cadastro</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Nome Completo" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <select id="cargo" required style="width:100%;padding:12px;margin:10px 0;border:1px solid #e8e5df;border-radius:8px;outline:none;background:#f8f7f4;color:#1c1917;box-sizing:border-box;">
                <option value="">Selecione seu cargo</option>
                <option value="Cliente">Cliente</option>
                <option value="Atendente">Atendente</option>
                <option value="Gestor de Produto">Gestor de Produto</option>
            </select>
            <input type="password" id="password" placeholder="Senha" required>
            <input type="password" id="confirmPassword" placeholder="Confirmar Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p>Já tem conta? <a href="login.html" style="color: #3730a3; cursor: pointer;">Faça login aqui</a></p>
    </div>

    <script src="../scripts/commonScript.js"></script>
    <script src="../scripts/loginScript.js"></script>
</body>
</html>
