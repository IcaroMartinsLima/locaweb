<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Indicadores - UniversalScore</title>
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html" style="text-decoration: none;">
                <img src="images/UniversalScore.png" alt="Logo" class="logo">
            </a>
            <h1>Indicadores</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="color: #aaa;" id="userGreeting"></span>
            <button class="button logout-button" onclick="logout()">Sair</button>
        </div>
    </header>

    <div class="content-container">
        <div class="indicators-grid">
            <div class="indicator-card">
                <div class="icon">📦</div>
                <h3>Total de Produtos</h3>
                <div class="value" id="totalProducts">0</div>
            </div>
            <div class="indicator-card">
                <div class="icon">⭐</div>
                <h3>Total de Avaliações</h3>
                <div class="value" id="totalRatings">0</div>
            </div>
            <div class="indicator-card">
                <div class="icon">📊</div>
                <h3>Avaliação Média</h3>
                <div class="value" id="avgRating">N/A</div>
            </div>
            <div class="indicator-card">
                <div class="icon">💰</div>
                <h3>Preço Máximo</h3>
                <div class="value" id="maxPrice">-</div>
            </div>
            <div class="indicator-card">
                <div class="icon">💵</div>
                <h3>Preço Mínimo</h3>
                <div class="value" id="minPrice">-</div>
            </div>
            <div class="indicator-card">
                <div class="icon">🏆</div>
                <h3>Mais Avaliado</h3>
                <div class="value" id="mostRated">0</div>
            </div>
        </div>

        <h2 style="margin-top: 40px; color: white;">Avaliações Recentes</h2>
        <table class="ratings-table">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Avaliador</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="ratingsBody"></tbody>
        </table>
    </div>

    <script src="commonScript.js"></script>
    <script src="indicatorsScript.js"></script>
</body>
</html>
